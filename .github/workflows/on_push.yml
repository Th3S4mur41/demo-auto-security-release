# This is workflow runs on push
#
name: Release

# Controls when the action will run.
on:
  # Trigger workflow for pull requests.
  push:
    branches: [main]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-code:
    name: '▶️ actions'
    uses: ./.github/workflows/lint-code.yml

  build:
    name: '▶️ actions'
    needs: [lint-code]
    uses: ./.github/workflows/npm-build.yml

  test:
    name: '▶️ actions'
    needs: [lint-code]
    uses: ./.github/workflows/npm-test.yml

  release:
    name: '▶️ actions'
    needs: [lint-code, build, test]
    uses: ./.github/workflows/semantic-release.yml
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }} # Token with repo write permission & admin rights to push to protected branches
    permissions:
      attestations: write
      contents: write
      issues: write
      pull-requests: write
      packages: write
      id-token: write
